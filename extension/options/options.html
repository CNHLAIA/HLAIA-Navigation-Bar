<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HLAIA 导航栏 — 扩展设置</title>
  <style>
    /* ============================================================
       全局样式 — 暗色主题，与主应用保持一致
       ============================================================ */

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f0f23;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ============================================================
       卡片容器 — 居中的设置面板
       ============================================================ */

    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .card-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .card-header h1 {
      font-size: 22px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 8px;
    }

    .card-header p {
      font-size: 14px;
      color: #8888aa;
    }

    /* ============================================================
       表单样式
       ============================================================ */

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #aaaacc;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: #0f0f23;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-group input:focus {
      border-color: #6c5ce7;
      box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.15);
    }

    .form-group input::placeholder {
      color: #555577;
    }

    /* ============================================================
       按钮样式
       ============================================================ */

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #6c5ce7;
      color: #ffffff;
    }

    .btn-primary:hover {
      background: #5a4bd6;
    }

    .btn-primary:active {
      background: #4e40c5;
    }

    .btn-primary:disabled {
      background: #3a3a5a;
      color: #666688;
      cursor: not-allowed;
    }

    .btn-danger {
      background: transparent;
      color: #ff6b6b;
      border: 1px solid #ff6b6b33;
    }

    .btn-danger:hover {
      background: #ff6b6b15;
    }

    /* ============================================================
       登录状态区域
       ============================================================ */

    .logged-in-info {
      text-align: center;
      padding: 20px;
      background: #6c5ce710;
      border: 1px solid #6c5ce730;
      border-radius: 12px;
      margin-bottom: 24px;
    }

    .logged-in-info .username {
      font-size: 18px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 4px;
    }

    .logged-in-info .role {
      font-size: 12px;
      color: #6c5ce7;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .logged-in-info .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #2ecc71;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }

    /* ============================================================
       提示消息
       ============================================================ */

    .message {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
    }

    .message.error {
      background: #ff6b6b15;
      border: 1px solid #ff6b6b40;
      color: #ff6b6b;
    }

    .message.success {
      background: #2ecc7115;
      border: 1px solid #2ecc7140;
      color: #2ecc71;
    }

    .message.visible {
      display: block;
    }

    /* ============================================================
       分隔线
       ============================================================ */

    .divider {
      border: none;
      border-top: 1px solid #2a2a4a;
      margin: 24px 0;
    }

    /* ============================================================
       底部信息
       ============================================================ */

    .footer {
      text-align: center;
      font-size: 12px;
      color: #555577;
      margin-top: 24px;
    }

    .footer a {
      color: #6c5ce7;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="card">
    <!-- 卡片标题 -->
    <div class="card-header">
      <h1>HLAIA 导航栏</h1>
      <p>浏览器扩展设置</p>
    </div>

    <!-- 提示消息区域 -->
    <div id="message" class="message"></div>

    <!-- 登录状态显示（登录后显示） -->
    <div id="loggedInSection" style="display: none;">
      <div class="logged-in-info">
        <div><span class="status-dot"></span><span class="username" id="displayUsername">—</span></div>
        <div class="role" id="displayRole">—</div>
      </div>
      <button class="btn btn-danger" id="logoutBtn">退出登录</button>
      <hr class="divider">
    </div>

    <!-- 登录表单（未登录时显示） -->
    <div id="loginSection">
      <div class="form-group">
        <label for="username">用户名</label>
        <input type="text" id="username" placeholder="请输入用户名" autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password">
      </div>
      <button class="btn btn-primary" id="loginBtn">登录</button>
    </div>

    <hr class="divider">

    <!-- 服务器地址配置（始终显示） -->
    <div class="form-group">
      <label for="serverUrl">API 服务器地址</label>
      <input type="url" id="serverUrl" placeholder="http://localhost:8080" value="http://localhost:8080">
    </div>

    <!-- 底部信息 -->
    <div class="footer">
      HLAIA Navigation Bar v1.0.0
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
